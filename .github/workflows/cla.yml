name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Required so the action can comment on PRs, set the check status, and commit
# the signatures file to this repository.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAssistant:
    runs-on: ubuntu-latest

    # Surface the signing token as an env var so the step below can detect
    # whether it has been configured (see the `if` guard).
    env:
      CLA_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}

    steps:
      # This step runs only once a CLA_SIGNATURES_TOKEN secret has been added to
      # the repository. Until then it is skipped, so the check passes (green)
      # instead of failing and blocking pull requests.
      #
      # To enable CLA enforcement:
      #   1. Create a fine-grained or classic Personal Access Token with
      #      "Contents" + "Pull requests" write access to THIS repository.
      #   2. Add it as a repository secret named CLA_SIGNATURES_TOKEN
      #      (Settings -> Secrets and variables -> Actions).
      # Signatures are stored in signatures/cla.json on the cla-signatures
      # branch of this repository.
      - name: "CLA Assistant"
        if: >-
          env.CLA_TOKEN != '' &&
          (
            github.event.comment.body == 'recheck' ||
            github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA' ||
            github.event_name == 'pull_request_target'
          )
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/Blackvectra/BloodHound-Legacy/blob/master/CLA.md"
          branch: "cla-signatures"
          # PR authors that never need to sign (repository owner and bots).
          allowlist: "Blackvectra,*[bot]"
